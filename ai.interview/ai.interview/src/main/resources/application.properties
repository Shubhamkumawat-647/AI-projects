spring.application.name=ai.interview
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/AI-Interview-assi
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always




spring.ai.vectorstore.azure.endpoint=https://<your-search-service>.search.windows.net
spring.ai.vectorstore.azure.api-key=<your-api-key>
spring.ai.vectorstore.azure.index-name=documents