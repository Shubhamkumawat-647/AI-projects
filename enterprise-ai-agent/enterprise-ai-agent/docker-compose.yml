version: "3.9"

services:

  enterprise-ai-agent:
    build: .
    container_name: enterprise-ai-agent

    restart: always

    ports:
      - "8082:8082"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5433/enterprise-ai-agent
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434

      JWT_SECRET: ThisIsMySuperSecretKeyForEnterpriseAIAgentProject123456789

    volumes:
      - ./uploads:/app/uploads